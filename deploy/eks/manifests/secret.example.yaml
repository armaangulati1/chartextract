# EXAMPLE ONLY. Do NOT put real credentials in this file and do NOT `kubectl
# apply` it with real values. It documents the keys the Deployment expects.
#
# The REAL Secret is created at runtime from your shell environment with a
# kubectl command (see RUNBOOK.md, "Create the Secret" step), so no real key is
# ever written to disk or committed to git.
#
# Keys mirror the envVars in render.yaml. For the demo, /health and the probes
# pass even with placeholder values here because the app reads these lazily.
# Only the /extract endpoint needs a real OPENAI_API_KEY and a reachable
# DATABASE_URL.
apiVersion: v1
kind: Secret
metadata:
  name: chartextract-secrets
  namespace: chartextract
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"
  DATABASE_URL: "REPLACE_ME"
  LANGFUSE_PUBLIC_KEY: "REPLACE_ME"
  LANGFUSE_SECRET_KEY: "REPLACE_ME"
