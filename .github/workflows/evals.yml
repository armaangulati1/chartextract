name: evals
on: [push, pull_request]
jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run extraction eval gate
        run: |
          python eval.py \
            --data-dir data/eval/ci_gold \
            --out-dir data/eval/ci_out \
            --cache data/eval/ci_predictions.jsonl \
            --use-cache \
            --min-macro-f1 0.85
